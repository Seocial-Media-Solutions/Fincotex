<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINCOTIX AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}

.navbar {
    display: flex;
    align-items: center;
    padding: 10px 40px;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
}

.logo {
    display: flex;
    align-items: center;
    justify-content: center;
}

.logo img {
    height: 130px;
    width: auto;
}

.container {
    width: 90%;
    max-width: 1100px;
    margin: auto;
    padding: 60px 0;
}

.hero {
    text-align: center;
    padding: 120px 20px;
}

h1 {
    font-size: 48px;
    background: linear-gradient(90deg, #38bdf8, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    color: #cbd5f5;
    font-size: 18px;
}

button {
    padding: 14px 28px;
    background: linear-gradient(90deg, #3b82f6, #6366f1);
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    font-weight: 600;
    margin-top: 15px;
}

.section {
    margin: 80px 0;
}

.features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
}

input {
    padding: 12px;
    width: 100%;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
}

.form-box {
    max-width: 400px;
    margin: auto;
    text-align: center;
}

.result-box {
    text-align: center;
    margin-top: 30px;
    padding: 20px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
}

.score {
    font-size: 48px;
    font-weight: bold;
}

.footer {
    text-align: center;
    padding: 40px;
    color: #94a3b8;
}

/* Popup */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: #0f172a;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
    width: 300px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">
        <img src="finecortex.png" alt="FINCOTIX AI Logo">
    </div>
</div>

<div class="hero">
    <h1>FINCOTIX AI</h1>
    <p class="subtitle">The Brain Behind Your Financial Decisions</p>
</div>

<div class="container">

<div class="section">
<h2>Smart Financial Decisions Powered by AI</h2>
<div class="features">
<div class="card">🧠 Financial Fragility Score</div>
<div class="card">📊 Decision Intelligence</div>
<div class="card">🎯 Goal Planning</div>
<div class="card">🔔 Risk Monitoring</div>
</div>
</div>

<div class="section">
<h2>Check Your Financial Score</h2>

<div class="form-box">
<input type="number" id="income" placeholder="Monthly Income">
<input type="number" id="expenses" placeholder="Monthly Expenses">
<input type="number" id="savings" placeholder="Savings">
<input type="number" id="emi" placeholder="EMI">

<button onclick="calculateScore()">Get Score</button>

<div class="result-box" id="result" style="display:none;">
    <div class="score" id="score"></div>
    <p id="status"></p>
    <p id="insight"></p>
</div>

</div>
</div>

</div>

<div class="footer">
FINCOTIX AI © 2026
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3>Get Full Report</h3>
    <input type="email" id="userEmail" placeholder="Enter your email">
    <button onclick="sendEmail()">Submit</button>
  </div>
</div>

<script>
function calculateScore() {
    let income = parseFloat(document.getElementById('income').value);
    let expenses = parseFloat(document.getElementById('expenses').value);
    let savings = parseFloat(document.getElementById('savings').value);
    let emi = parseFloat(document.getElementById('emi').value);

    if (!income || !expenses || !savings || !emi) {
        alert("Please fill all fields");
        return;
    }

    let savingsRatio = savings / expenses;
    let expenseRatio = expenses / income;
    let debtRatio = emi / income;

    let savingsScore = savingsRatio > 12 ? 100 :
                       savingsRatio > 6 ? 75 :
                       savingsRatio > 3 ? 50 : 20;

    let expenseScore = expenseRatio < 0.5 ? 100 :
                       expenseRatio < 0.7 ? 70 : 40;

    let debtScore = debtRatio < 0.2 ? 100 :
                    debtRatio < 0.4 ? 70 : 30;

    let finalScore = Math.round(
        (0.4 * savingsScore) +
        (0.3 * expenseScore) +
        (0.3 * debtScore)
    );

    let status = finalScore >= 80 ? "🟢 Safe" :
                 finalScore >= 60 ? "🟡 Moderate" :
                 "🔴 Risky";

    let insight = finalScore >= 80 ?
        "Strong financial stability." :
        finalScore >= 60 ?
        "Needs improvement." :
        "Financial risk is high.";

    document.getElementById('result').style.display = 'block';
    document.getElementById('score').innerText = finalScore;
    document.getElementById('status').innerText = status;
    document.getElementById('insight').innerText = insight;

    setTimeout(() => {
        document.getElementById('popup').style.display = 'flex';
    }, 1200);
}

function sendEmail() {
    let email = document.getElementById('userEmail').value;
    if (!email) {
        alert("Enter email");
        return;
    }

    window.location.href = `mailto:muditmathur76@gmail.com?subject=FINCOTIX Lead&body=${email}`;
}
</script>

</body>
</html>
